<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>幸运大转盘</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='50' font-size='50'>🎁</text></svg>">

  <style>
    :root{
      --bg1:#ff3b5c;
      --bg2:#ff7a6a;
      --gold:#ffd27a;
      --gold2:#ffb84d;
      --deep:#b10f2a;
      --white:#fff;
      --shadow: 0 18px 60px rgba(0,0,0,.18);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
      background: radial-gradient(1200px 800px at 50% 20%, #ff9aa6 0%, #ff5a73 35%, #ff3b5c 70%, #f12a4b 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      overflow:hidden;
    }

    .page{
      width:min(430px, 100vw);
      height:min(860px, 100vh);
      aspect-ratio: 9 / 16;
      border-radius:18px;
      overflow:hidden;
      position:relative;
      box-shadow: var(--shadow);
      background:
        radial-gradient(900px 600px at 50% 10%, rgba(255,255,255,.22) 0%, rgba(255,255,255,0) 55%),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0));
    }

    .top{
      padding:26px 18px 10px;
      text-align:center;
      color:#fff;
      position:relative;
    }
    .title{
      font-size:44px;
      font-weight:1000;
      letter-spacing:2px;
      text-shadow: 0 10px 30px rgba(0,0,0,.25);
      margin:6px 0 10px;
    }
    .sub{
      display:inline-block;
      padding:10px 16px;
      border-radius:999px;
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.78));
      color:#ff3b5c;
      font-weight:1000;
      box-shadow: 0 12px 30px rgba(0,0,0,.12);
      border:1px solid rgba(255,255,255,.55);
    }

    .stage{
      position:absolute;
      left:0; right:0;
      top:140px;
      bottom:0;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding-top:18px;
    }

    .wheelWrap{
      width:min(360px, 92vw);
      aspect-ratio:1/1;
      position:relative;
      filter: drop-shadow(0 18px 40px rgba(0,0,0,.22));
    }

    .pointer{
      position:absolute;
      left:50%;
      top:-10px;
      transform:translateX(-50%);
      width:0;height:0;
      border-left:16px solid transparent;
      border-right:16px solid transparent;
      border-bottom:28px solid #fff;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.25));
      z-index:6;
    }
    .pointer::after{
      content:"";
      position:absolute;
      left:-10px;
      top:18px;
      width:20px;height:20px;
      border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #fff 0%, #ffe7b8 45%, #ffcc66 100%);
      border:2px solid rgba(255,255,255,.9);
      box-shadow: 0 10px 18px rgba(0,0,0,.18);
    }

    .bulbs{
      position:absolute;
      inset:-10px;
      border-radius:50%;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.18), rgba(255,255,255,0) 60%);
      z-index:1;
      pointer-events:none;
    }
    .bulb{
      position:absolute;
      width:10px;height:10px;
      border-radius:50%;
      background:#fff;
      box-shadow: 0 0 14px rgba(255,255,255,.9);
      opacity:.95;
      animation: twinkle 1.2s infinite ease-in-out;
    }
    @keyframes twinkle{
      0%,100%{transform:scale(1); opacity:.85}
      50%{transform:scale(1.25); opacity:1}
    }

    .wheel{
      position:absolute;
      inset:0;
      border-radius:50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.35) 0%, rgba(255,255,255,0) 55%),
        linear-gradient(180deg, #ff4a66, #ff2f55);
      border:10px solid rgba(255,255,255,.35);
      z-index:2;
      overflow:hidden;
    }

    .plate{
      position:absolute;
      inset:14px;
      border-radius:50%;
      background: radial-gradient(circle at 50% 50%, #fff 0%, #fff7ea 55%, #ffe7c2 100%);
      border:8px solid rgba(255,210,122,.85);
      transform: rotate(0deg);
      transition: transform 4.2s cubic-bezier(.12,.78,.12,1);
      z-index:3;
    }

    /* 扇区：用 clip-path 做 45° 扇形 */
    .slice{
      position:absolute;
      inset:0;
      clip-path: polygon(50% 50%, 100% 0, 100% 100%);
      transform-origin: 50% 50%;
    }
    .sliceInner{
      position:absolute;
      inset:0;
      transform-origin: 50% 50%;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      padding-left:56%;
      padding-right:6%;
      gap:8px;
      color:#c01833;
      font-weight:1000;
      font-size:13px;
      line-height:1.1;
    }
    .slice:nth-child(odd) .sliceInner{ background: rgba(255, 90, 115, .10); }
    .slice:nth-child(even) .sliceInner{ background: rgba(255, 210, 122, .18); }

    .sliceContent{
      display:flex;
      align-items:center;
      gap:8px;
      transform: rotate(90deg);
      transform-origin:left center;
      white-space:nowrap;
    }

    .prizeIcon{
      width:34px;height:34px;
      border-radius:10px;
      background: rgba(255,255,255,.85);
      border:1px solid rgba(0,0,0,.06);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex:0 0 auto;
      box-shadow: 0 10px 18px rgba(0,0,0,.08);
    }
    .prizeIcon img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .prizeText{
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .prizeText .t1{ font-size:13px; color:#b10f2a; }
    .prizeText .t2{ font-size:11px; color:#ff3b5c; opacity:.9; font-weight:900; }

    .center{
      position:absolute;
      left:50%; top:50%;
      transform:translate(-50%,-50%);
      width:118px;height:118px;
      border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #fff 0%, #ffe7b8 35%, #ffcc66 100%);
      border:10px solid rgba(255,255,255,.65);
      box-shadow: 0 18px 40px rgba(0,0,0,.18);
      z-index:5;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
    }
    .center:active{transform:translate(-50%,-50%) scale(.99)}
    .centerBtn{
      width:86px;height:86px;
      border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #ff6b7f 0%, #ff3b5c 55%, #e81f45 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-weight:1000;
      font-size:18px;
      letter-spacing:1px;
      box-shadow: inset 0 10px 18px rgba(255,255,255,.18);
    }
    .centerSmall{
      position:absolute;
      bottom:10px;
      font-size:11px;
      color:rgba(255,255,255,.92);
      font-weight:900;
      letter-spacing:.5px;
    }

    .footerTip{
      position:absolute;
      left:18px; right:18px;
      bottom:18px;
      text-align:center;
      color:rgba(255,255,255,.85);
      font-size:12px;
      text-shadow: 0 10px 24px rgba(0,0,0,.18);
    }

    .winMask{
      position:absolute; inset:0;
      background:rgba(0,0,0,.35);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:20;
    }
    .winModal{
      width:min(360px, 92%);
      background:#fff;
      border-radius:18px;
      box-shadow: 0 18px 60px rgba(0,0,0,.25);
      overflow:hidden;
      border:1px solid rgba(0,0,0,.06);
    }
    .winTitle{
      padding:16px 16px 8px;
      font-weight:1000;
      color:#111;
      font-size:16px;
      text-align:center;
    }
    .payCard{
      margin:0 16px 12px;
      border-radius:14px;
      padding:14px 14px;
      background: linear-gradient(180deg, #fff7ea, #fff);
      border:1px solid rgba(255, 210, 122, .55);
      text-align:center;
    }
    .payCard .big{
      font-size:40px;
      font-weight:1000;
      color:#111;
      letter-spacing:1px;
      margin:6px 0 2px;
    }
    .payCard .sub2{
      font-size:12px;
      color:#6b7280;
      font-weight:700;
    }
    .winBtn{
      width:calc(100% - 32px);
      margin:0 16px 14px;
      border:0;
      border-radius:12px;
      padding:14px 14px;
      background:#07c160;
      color:#fff;
      font-weight:1000;
      font-size:16px;
      cursor:pointer;
      box-shadow:0 14px 30px rgba(7,193,96,.22);
    }
    .winBtn:active{transform:scale(.99)}
    .winHint{
      padding:0 16px 16px;
      text-align:center;
      color:#8a8f98;
      font-size:12px;
    }

    #coinLayer{
      position:absolute; inset:0;
      pointer-events:none;
      display:none;
      z-index:19;
    }
    .coin{
      position:absolute;
      top:-40px;
      width:18px;height:18px;
      border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #fff 0%, #ffe7b8 35%, #ffcc66 100%);
      box-shadow: 0 10px 18px rgba(0,0,0,.12);
      animation: fall 2.2s linear forwards;
    }
    @keyframes fall{
      to{ transform: translateY(110vh) rotate(360deg); opacity:.95; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="top">
      <div class="title">幸运大转盘</div>
      <div class="sub">100%中奖 · 好礼享不停</div>
    </div>

    <div class="stage">
      <div class="wheelWrap">
        <div class="pointer" aria-hidden="true"></div>
        <div class="bulbs" id="bulbs" aria-hidden="true"></div>
        <div class="wheel" aria-hidden="true"></div>

        <div class="plate" id="plate" aria-label="抽奖转盘">
          <!-- 8个扇区：每个45度 -->
          <div class="slice" style="transform:rotate(0deg)">
            <div class="sliceInner" style="transform:rotate(0deg)">
              <div class="sliceContent">
                <div class="prizeIcon" aria-hidden="true">
                  <!-- 红包 SVG -->
                  <svg width="26" height="26" viewBox="0 0 64 64" fill="none">
                    <path d="M10 22c0-4 3-7 7-7h30c4 0 7 3 7 7v28c0 4-3 7-7 7H17c-4 0-7-3-7-7V22z" fill="#ff3b5c"/>
                    <path d="M10 28h44v8H10v-8z" fill="#ffd27a"/>
                    <circle cx="32" cy="32" r="7" fill="#fff"/>
                    <path d="M32 27c2 0 4 2 4 4s-2 4-4 4-4-2-4-4 2-4 4-4z" fill="#ff3b5c"/>
                  </svg>
                </div>
                <div class="prizeText">
                  <div class="t1">99元补贴金</div>
                  <div class="t2">立即到账</div>
                </div>
              </div>
            </div>
          </div>

          <div class="slice" style="transform:rotate(45deg)">
            <div class="sliceInner" style="transform:rotate(45deg)">
              <div class="sliceContent">
                <div class="prizeIcon" aria-hidden="true">
                  <!-- 券 SVG -->
                  <svg width="26" height="26" viewBox="0 0 64 64" fill="none">
                    <path d="M14 18c0-3 2-5 5-5h26c3 0 5 2 5 5v8a6 6 0 0 0 0 12v8c0 3-2 5-5 5H19c-3 0-5-2-5-5v-8a6 6 0 0 0 0-12v-8z" fill="#ffb84d"/>
                    <path d="M24 22h16v4H24v-4zm0 10h12v4H24v-4zm0 10h16v4H24v-4z" fill="#fff"/>
                  </svg>
                </div>
                <div class="prizeText">
                  <div class="t1">1.99元补贴券</div>
                  <div class="t2">满减可用</div>
                </div>
              </div>
            </div>
          </div>

          <div class="slice" style="transform:rotate(90deg)">
            <div class="sliceInner" style="transform:rotate(90deg)">
              <div class="sliceContent">
                <div class="prizeIcon" aria-hidden="true">
                  <img alt="水果" src="https://raw.githubusercontent.com/Cwt123456789/subsidy-demo/main/%E6%B0%B4%E6%9E%9C.webp">
                </div>
                <div class="prizeText">
                  <div class="t1">水果礼包</div>
                  <div class="t2">随机发放</div>
                </div>
              </div>
            </div>
          </div>

          <div class="slice" style="transform:rotate(135deg)">
            <div class="sliceInner" style="transform:rotate(135deg)">
              <div class="sliceContent">
                <div class="prizeIcon" aria-hidden="true">
                  <img alt="抽纸" src="https://raw.githubusercontent.com/Cwt123456789/subsidy-demo/main/%E6%8A%BD%E7%BA%B8.webp">
                </div>
                <div class="prizeText">
                  <div class="t1">抽纸礼包</div>
                  <div class="t2">包邮到家</div>
                </div>
              </div>
            </div>
          </div>

          <div class="slice" style="transform:rotate(180deg)">
            <div class="sliceInner" style="transform:rotate(180deg)">
              <div class="sliceContent">
                <div class="prizeIcon" aria-hidden="true">
                  <svg width="26" height="26" viewBox="0 0 64 64" fill="none">
                    <path d="M12 22c0-4 3-7 7-7h26c4 0 7 3 7 7v20c0 4-3 7-7 7H19c-4 0-7-3-7-7V22z" fill="#ff6b7f"/>
                    <path d="M20 30h24v4H20v-4zm0 10h18v4H20v-4z" fill="#fff"/>
                  </svg>
                </div>
                <div class="prizeText">
                  <div class="t1">10元券</div>
                  <div class="t2">限时可用</div>
                </div>
              </div>
            </div>
          </div>

          <div class="slice" style="transform:rotate(225deg)">
            <div class="sliceInner" style="transform:rotate(225deg)">
              <div class="sliceContent">
                <div class="prizeIcon" aria-hidden="true">
                  <img alt="鸡蛋" src="https://raw.githubusercontent.com/Cwt123456789/subsidy-demo/main/%E9%B8%A1%E8%9B%8B.webp">
                </div>
                <div class="prizeText">
                  <div class="t1">鸡蛋礼包</div>
                  <div class="t2">新鲜直达</div>
                </div>
              </div>
            </div>
          </div>

          <div class="slice" style="transform:rotate(270deg)">
            <div class="sliceInner" style="transform:rotate(270deg)">
              <div class="sliceContent">
                <div class="prizeIcon" aria-hidden="true">
                  <svg width="26" height="26" viewBox="0 0 64 64" fill="none">
                    <path d="M14 18c0-3 2-5 5-5h26c3 0 5 2 5 5v8a6 6 0 0 0 0 12v8c0 3-2 5-5 5H19c-3 0-5-2-5-5v-8a6 6 0 0 0 0-12v-8z" fill="#ffb84d"/>
                    <path d="M24 22h16v4H24v-4zm0 10h12v4H24v-4zm0 10h16v4H24v-4z" fill="#fff"/>
                  </svg>
                </div>
                <div class="prizeText">
                  <div class="t1">1.99元补贴券</div>
                  <div class="t2">满减可用</div>
                </div>
              </div>
            </div>
          </div>

          <div class="slice" style="transform:rotate(315deg)">
            <div class="sliceInner" style="transform:rotate(315deg)">
              <div class="sliceContent">
                <div class="prizeIcon" aria-hidden="true">
                  <svg width="26" height="26" viewBox="0 0 64 64" fill="none">
                    <path d="M10 22c0-4 3-7 7-7h30c4 0 7 3 7 7v28c0 4-3 7-7 7H17c-4 0-7-3-7-7V22z" fill="#ff3b5c"/>
                    <path d="M10 28h44v8H10v-8z" fill="#ffd27a"/>
                    <circle cx="32" cy="32" r="7" fill="#fff"/>
                    <path d="M32 27c2 0 4 2 4 4s-2 4-4 4-4-2-4-4 2-4 4-4z" fill="#ff3b5c"/>
                  </svg>
                </div>
                <div class="prizeText">
                  <div class="t1">88元补贴金</div>
                  <div class="t2">立即到账</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="center" id="startBtn" role="button" aria-label="开始抽奖">
          <div class="centerBtn">抽奖</div>
          <div class="centerSmall">点击开始</div>
        </div>
      </div>
    </div>


    <div id="coinLayer"></div>

    <div class="winMask" id="winMask">
      <div class="winModal" role="dialog" aria-modal="true" aria-label="中奖提示">
        <div class="winTitle">恭喜你中奖啦</div>
        <div class="payCard" aria-label="补贴金发放">
          <div class="sub2">补贴金金额</div>
          <div class="big">¥<span id="winAmount">99</span></div>
          <div class="sub2">点击下方按钮前往领取</div>
        </div>
        <button class="winBtn" id="winBtn">开心收下</button>
        <div class="winHint">提示：将跳转到领取页（claim.html）</div>
      </div>
    </div>
  </div>

<script>
(() => {
  const plate = document.getElementById('plate');
  const startBtn = document.getElementById('startBtn');
  const winMask = document.getElementById('winMask');
  const winBtn = document.getElementById('winBtn');
  const winAmount = document.getElementById('winAmount');
  const bulbs = document.getElementById('bulbs');
  const coinLayer = document.getElementById('coinLayer');

  // 外圈灯泡
  (function buildBulbs(){
    const n = 28;
    const r = 50;
    for(let i=0;i<n;i++){
      const b = document.createElement('div');
      b.className = 'bulb';
      const ang = (i / n) * Math.PI * 2;
      const x = 50 + Math.cos(ang) * r;
      const y = 50 + Math.sin(ang) * r;
      b.style.left = `calc(${x}% - 5px)`;
      b.style.top  = `calc(${y}% - 5px)`;
      b.style.animationDelay = (i * 0.06) + 's';
      bulbs.appendChild(b);
    }
  })();

  function coinRain(){
    coinLayer.style.display = 'block';
    coinLayer.innerHTML = '';
    const count = 28;
    for(let i=0;i<count;i++){
      const c = document.createElement('div');
      c.className = 'coin';
      c.style.left = (Math.random() * 100) + 'vw';
      c.style.animationDuration = (1.8 + Math.random() * 1.2) + 's';
      c.style.animationDelay = (Math.random() * 0.25) + 's';
      coinLayer.appendChild(c);
      c.addEventListener('animationend', () => c.remove());
    }
    setTimeout(() => { coinLayer.style.display = 'none'; }, 2600);
  }

  // 8个扇区（与页面扇区顺序一致）
  const prizes = [
    { label: '99元补贴金', amount: 99 },
    { label: '1.99元补贴券', amount: 2 },
    { label: '水果礼包', amount: 66 },
    { label: '抽纸礼包', amount: 66 },
    { label: '10元券', amount: 10 },
    { label: '鸡蛋礼包', amount: 66 },
    { label: '1.99元补贴券', amount: 2 },
    { label: '88元补贴金', amount: 88 },
  ];

  let spinning = false;
  let currentDeg = 0;

  function spinTo(index){
    const slice = 45;
    const centerDeg = index * slice + slice/2;
    const rounds = 5;
    const target = (rounds * 360) - centerDeg;

    const nextDeg = currentDeg + target + (360 - (currentDeg % 360));
    currentDeg = nextDeg;

    plate.style.transform = `rotate(${currentDeg}deg)`;
  }

  function showWin(amount){
    winAmount.textContent = String(amount);
    winMask.style.display = 'flex';
  }

  startBtn.addEventListener('click', () => {
    if (spinning) return;
    spinning = true;

    // 默认固定中 99（你要随机就把下面一行换成随机）
    const idx = 0;
    // const idx = Math.floor(Math.random() * prizes.length);

    spinTo(idx);

    setTimeout(() => {
      spinning = false;
      coinRain();
      showWin(prizes[idx].amount);
    }, 4300);
  });

  winBtn.addEventListener('click', () => {
    const amt = winAmount.textContent || '99';
    location.href = '/subsidy-demo/claim.html?amount=' + encodeURIComponent(amt);
  });

  winMask.addEventListener('click', (e) => {
    if (e.target === winMask) winMask.style.display = 'none';
  });
})();
</script>
</body>
</html>
