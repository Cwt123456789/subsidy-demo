<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>幸运大转盘</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='50' font-size='50'>🎁</text></svg>">

  <style>
    :root{
      --red:#ff3b5c;
      --red2:#ff5a73;
      --gold:#ffd27a;
      --gold2:#ffb84d;
      --text:#b10f2a;
      --shadow: 0 18px 60px rgba(0,0,0,.18);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
      background: radial-gradient(1200px 800px at 50% 20%, #ff9aa6 0%, #ff5a73 35%, #ff3b5c 70%, #f12a4b 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      overflow:hidden;
    }

    .page{
      width:min(430px, 100vw);
      height:min(860px, 100vh);
      aspect-ratio: 9 / 16;
      border-radius:18px;
      overflow:hidden;
      position:relative;
      box-shadow: var(--shadow);
      background:
        radial-gradient(900px 600px at 50% 10%, rgba(255,255,255,.22) 0%, rgba(255,255,255,0) 55%),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0));
    }

    .top{
      padding:26px 18px 10px;
      text-align:center;
      color:#fff;
    }
    .title{
      font-size:44px;
      font-weight:1000;
      letter-spacing:2px;
      text-shadow: 0 10px 30px rgba(0,0,0,.25);
      margin:6px 0 10px;
    }
    .sub{
      display:inline-block;
      padding:10px 16px;
      border-radius:999px;
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.78));
      color:var(--red);
      font-weight:1000;
      box-shadow: 0 12px 30px rgba(0,0,0,.12);
      border:1px solid rgba(255,255,255,.55);
    }

    .stage{
      position:absolute;
      left:0; right:0;
      top:140px;
      bottom:0;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding-top:18px;
    }

    .wheelWrap{
      width:min(360px, 92vw);
      aspect-ratio:1/1;
      position:relative;
      filter: drop-shadow(0 18px 40px rgba(0,0,0,.22));
    }

    /* 指针 */
    .pointer{
      position:absolute;
      left:50%;
      top:-10px;
      transform:translateX(-50%);
      width:0;height:0;
      border-left:16px solid transparent;
      border-right:16px solid transparent;
      border-bottom:28px solid #fff;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.25));
      z-index:6;
    }
    .pointer::after{
      content:"";
      position:absolute;
      left:-10px;
      top:18px;
      width:20px;height:20px;
      border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #fff 0%, #ffe7b8 45%, #ffcc66 100%);
      border:2px solid rgba(255,255,255,.9);
      box-shadow: 0 10px 18px rgba(0,0,0,.18);
    }

    /* 外圈灯泡 */
    .bulbs{
      position:absolute;
      inset:-10px;
      border-radius:50%;
      z-index:1;
      pointer-events:none;
    }
    .bulb{
      position:absolute;
      width:10px;height:10px;
      border-radius:50%;
      background:#fff;
      box-shadow: 0 0 14px rgba(255,255,255,.9);
      opacity:.95;
      animation: twinkle 1.2s infinite ease-in-out;
    }
    @keyframes twinkle{
      0%,100%{transform:scale(1); opacity:.85}
      50%{transform:scale(1.25); opacity:1}
    }

    /* 外圈红边 */
    .wheel{
      position:absolute;
      inset:0;
      border-radius:50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.35) 0%, rgba(255,255,255,0) 55%),
        linear-gradient(180deg, #ff4a66, #ff2f55);
      border:10px solid rgba(255,255,255,.35);
      z-index:2;
      overflow:hidden;
    }

    /* 可旋转盘面 */
    .plate{
      position:absolute;
      inset:14px;
      border-radius:50%;
      background: radial-gradient(circle at 50% 50%, #fff 0%, #fff7ea 55%, #ffe7c2 100%);
      border:8px solid rgba(255,210,122,.85);
      transform: rotate(0deg);
      transition: transform 4.2s cubic-bezier(.12,.78,.12,1);
      z-index:3;
      overflow:hidden;
    }

    /* 8个扇形背景 */
    .sliceBg{
      position:absolute;
      inset:0;
      clip-path: polygon(50% 50%, 100% 0, 100% 100%);
      transform-origin: 50% 50%;
    }
    .sliceBg:nth-child(odd){ background: rgba(255, 90, 115, .10); }
    .sliceBg:nth-child(even){ background: rgba(255, 210, 122, .18); }

    /* 奖品层：不跟着盘面旋转（关键！） */
    .prizeLayer{
      position:absolute;
      inset:0;
      z-index:4;
      pointer-events:none;
    }

    /* 奖品卡片：用 JS 设置 left/top，保证均匀分布 */
    .prize{
      position:absolute;
      width:150px;
      transform: translate(-50%, -50%);
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--text);
      font-weight:1000;
    }
    .prizeIcon{
      width:44px;height:44px;
      border-radius:12px;
      background: rgba(255,255,255,.92);
      border:1px solid rgba(0,0,0,.06);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex:0 0 auto;
      box-shadow: 0 10px 18px rgba(0,0,0,.08);
    }
    .prizeIcon img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .prizeText{
      display:flex;
      flex-direction:column;
      gap:3px;
      min-width:0;
    }
    .t1{
      font-size:13px;
      line-height:1.15;
      color:#b10f2a;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:92px;
    }
    .t2{
      font-size:11px;
      line-height:1.15;
      color:#ff3b5c;
      opacity:.95;
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:92px;
    }

    /* 中心按钮 */
    .center{
      position:absolute;
      left:50%; top:50%;
      transform:translate(-50%,-50%);
      width:118px;height:118px;
      border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #fff 0%, #ffe7b8 35%, #ffcc66 100%);
      border:10px solid rgba(255,255,255,.65);
      box-shadow: 0 18px 40px rgba(0,0,0,.18);
      z-index:6;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
    }
    .center:active{transform:translate(-50%,-50%) scale(.99)}
    .centerBtn{
      width:86px;height:86px;
      border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #ff6b7f 0%, #ff3b5c 55%, #e81f45 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-weight:1000;
      letter-spacing:1px;
      box-shadow: inset 0 10px 18px rgba(255,255,255,.18);
      line-height:1.05;
    }
    .centerBtn .big{font-size:18px}
    .centerBtn .small{font-size:11px; opacity:.95; margin-top:6px; font-weight:900}

    .footerTip{
      position:absolute;
      left:18px; right:18px;
      bottom:18px;
      text-align:center;
      color:rgba(255,255,255,.85);
      font-size:12px;
      text-shadow: 0 10px 24px rgba(0,0,0,.18);
    }

    /* 弹窗 */
    .winMask{
      position:absolute; inset:0;
      background:rgba(0,0,0,.35);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:20;
    }
    .winModal{
      width:min(360px, 92%);
      background:#fff;
      border-radius:18px;
      box-shadow: 0 18px 60px rgba(0,0,0,.25);
      overflow:hidden;
      border:1px solid rgba(0,0,0,.06);
    }
    .winTitle{
      padding:16px 16px 8px;
      font-weight:1000;
      color:#111;
      font-size:16px;
      text-align:center;
    }
    .payCard{
      margin:0 16px 12px;
      border-radius:14px;
      padding:14px 14px;
      background: linear-gradient(180deg, #fff7ea, #fff);
      border:1px solid rgba(255, 210, 122, .55);
      text-align:center;
    }
    .payCard .big{
      font-size:40px;
      font-weight:1000;
      color:#111;
      letter-spacing:1px;
      margin:6px 0 2px;
    }
    .payCard .sub2{
      font-size:12px;
      color:#6b7280;
      font-weight:700;
    }
    .winBtn{
      width:calc(100% - 32px);
      margin:0 16px 14px;
      border:0;
      border-radius:12px;
      padding:14px 14px;
      background:#07c160;
      color:#fff;
      font-weight:1000;
      font-size:16px;
      cursor:pointer;
      box-shadow:0 14px 30px rgba(7,193,96,.22);
    }
    .winBtn:active{transform:scale(.99)}
    .winHint{
      padding:0 16px 16px;
      text-align:center;
      color:#8a8f98;
      font-size:12px;
    }

    /* 金币雨 */
    #coinLayer{
      position:absolute; inset:0;
      pointer-events:none;
      display:none;
      z-index:19;
    }
    .coin{
      position:absolute;
      top:-40px;
      width:18px;height:18px;
      border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #fff 0%, #ffe7b8 35%, #ffcc66 100%);
      box-shadow: 0 10px 18px rgba(0,0,0,.12);
      animation: fall 2.2s linear forwards;
    }
    @keyframes fall{
      to{ transform: translateY(110vh) rotate(360deg); opacity:.95; }
    }
  </style>
</head>

<body>

            </div>

            <div class="prizeIcon">
              <svg width="30" height="30" viewBox="0 0 64 64" fill="none">
                <path d="M10 22c0-4 3-7 7-7h30c4 0 7 3 7 7v28c0 4-3 7-7 7H17c-4 0-7-3-7-7V22z" fill="#ff3b5c"/>
                <path d="M10 28h44v8H10v-8z" fill="#ffd27a"/>

                <path d="M10 28h44v8H10v-8z" fill="#ffd27a"/>

<script>
(() => {
  const plate = document.getElementById('plate');
  const startBtn = document.getElementById('startBtn');
  const winMask = document.getElementById('winMask');
  const winBtn = document.getElementById('winBtn');
  const winAmount = document.getElementById('winAmount');
  const winLabel = document.getElementById('winLabel');
  const bulbs = document.getElementById('bulbs');
  const coinLayer = document.getElementById('coinLayer');
  const prizeLayer = document.getElementById('prizeLayer');

  // 灯泡
  (function buildBulbs(){
    const n = 28;
    const r = 50;
    for(let i=0;i<n;i++){
      const b = document.createElement('div');
      b.className = 'bulb';
      const ang = (i / n) * Math.PI * 2;
      const x = 50 + Math.cos(ang) * r;
      const y = 50 + Math.sin(ang) * r;
      b.style.left = `calc(${x}% - 5px)`;
      b.style.top  = `calc(${y}% - 5px)`;
      b.style.animationDelay = (i * 0.06) + 's';
      bulbs.appendChild(b);
    }
  })();

  function coinRain(){
    coinLayer.style.display = 'block';
    coinLayer.innerHTML = '';
    const count = 28;
    for(let i=0;i<count;i++){
      const c = document.createElement('div');
      c.className = 'coin';
      c.style.left = (Math.random() * 100) + 'vw';
      c.style.animationDuration = (1.8 + Math.random() * 1.2) + 's';
      c.style.animationDelay = (Math.random() * 0.25) + 's';
      coinLayer.appendChild(c);
      c.addEventListener('animationend', () => c.remove());
    }
    setTimeout(() => { coinLayer.style.display = 'none'; }, 2600);
  }

  // 8个奖品（顺序：从正上方开始，顺时针）
  const prizes = [
    { type:'coupon', label:'1.5元无门槛券', amount: 1.5 },
    { type:'cash',   label:'99元补贴金', amount: 99 },
    { type:'goods',  label:'1.99元抢购水果（价值66元）', amount: 1.99 },
    { type:'cash',   label:'88元补贴金', amount: 88 },
    { type:'goods',  label:'1.88元抢购鸡蛋（价值66元）', amount: 1.88 },
    { type:'coupon', label:'10元无门槛券', amount: 10 },
    { type:'cash',   label:'66元补贴金', amount: 66 },
    { type:'goods',  label:'1.99元抢购抽纸（价值66元）', amount: 1.99 },
  ];

  // 关键：均匀分布奖品位置（极坐标）
  function layoutPrizes(){
    const rect = prizeLayer.getBoundingClientRect();
    const cx = rect.width / 2;
    const cy = rect.height / 2;

    // 半径：根据盘面大小自适应（越大越靠外）
    // 这里取较小边的 0.28，基本能落在扇区中间，不会挤到中心按钮
    const r = Math.min(rect.width, rect.height) * 0.28;

    const nodes = prizeLayer.querySelectorAll('.prize');
    nodes.forEach(node => {
      const i = Number(node.dataset.i || 0);

      // 扇区中心角：-90°（正上方）开始，顺时针每格45°
      const deg = -90 + i * 45;
      const rad = deg * Math.PI / 180;

      const x = cx + Math.cos(rad) * r;
      const y = cy + Math.sin(rad) * r;

      node.style.left = x + 'px';
      node.style.top  = y + 'px';

      // 让左右两侧的卡片朝向更自然：左半边右对齐
      // （可选优化，不影响均匀分布）
      const isLeft = (deg > 90 || deg < -90);
      node.style.justifyContent = isLeft ? 'flex-end' : 'flex-start';
      node.style.textAlign = isLeft ? 'right' : 'left';
      node.style.flexDirection = isLeft ? 'row-reverse' : 'row';
    });
  }

  // 初次布局 + 监听尺寸变化
  layoutPrizes();
  window.addEventListener('resize', layoutPrizes);

  let spinning = false;
  let currentDeg = 0;

  function spinTo(index){
    const slice = 45;
    const centerDeg = index * slice + slice/2; // 22.5, 67.5...
    const rounds = 5;
    const target = (rounds * 360) - centerDeg;

    const nextDeg = currentDeg + target + (360 - (currentDeg % 360));
    currentDeg = nextDeg;

    plate.style.transform = `rotate(${currentDeg}deg)`;
  }

  function showWin(prize){
    winLabel.textContent = prize.label;
    winAmount.textContent = String(prize.amount);
    winMask.style.display = 'flex';
  }

  startBtn.addEventListener('click', () => {
    if (spinning) return;
    spinning = true;

    // 默认固定中“99元补贴金”（index=1），你要随机就改成随机
    const idx = 1;
    // const idx = Math.floor(Math.random() * prizes.length);

    spinTo(idx);

    setTimeout(() => {
      spinning = false;
      coinRain();
      showWin(prizes[idx]);
    }, 4300);
  });

  winBtn.addEventListener('click', () => {
    const amt = winAmount.textContent || '99';
    location.href = '/subsidy-demo/claim.html?amount=' + encodeURIComponent(amt);
  });

  winMask.addEventListener('click', (e) => {
    if (e.target === winMask) winMask.style.display = 'none';
  });
})();
</script>
</body>
</html>
