<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>幸运抽奖</title>
  <style>
    :root{
      --red1:#ff3b3b;
      --red2:#ff2f6a;
      --gold1:#ffe7b0;
      --gold2:#fff2cf;
      --stroke:#ffd27a;
      --text:#7a2b00;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
      background: radial-gradient(1200px 700px at 50% 15%, #ff9aa8 0%, var(--red2) 35%, var(--red1) 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      overflow:hidden;
    }

    /* 9:16 画布 */
    .stage{
      width:min(430px, 100vw);
      height:min(860px, 100vh);
      aspect-ratio: 9 / 16;
      position:relative;
      overflow:hidden;
      border-radius:0;
    }

    /* 顶部栏 */
    .top{
      position:absolute;left:0;right:0;top:0;
      padding:14px 14px 10px;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      z-index:5;
      pointer-events:none;
    }
    .top .left,.top .right{width:56px;opacity:.95;font-weight:700;font-size:16px}
    .top .right{text-align:right}
    .top .center{flex:1;display:flex;justify-content:center}

    /* “幸运抽奖”特效标题 */
    .titleWrap{
      position:relative;
      padding:8px 18px;
      border-radius:999px;
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.22);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      font-weight:900;
      letter-spacing:2px;
      text-shadow:0 6px 18px rgba(0,0,0,.25);
      pointer-events:auto;
      user-select:none;
    }
    .titleWrap .title{
      font-size:16px;
      background: linear-gradient(180deg, #fff 0%, #ffe9b8 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    .spark{
      position:absolute;
      inset:-6px;
      border-radius:999px;
      overflow:hidden;
      pointer-events:none;
    }
    .spark::before{
      content:"";
      position:absolute;
      width:120px;height:120px;
      left:-140px;top:-40px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.95) 0%, rgba(255,255,255,.35) 35%, rgba(255,255,255,0) 70%);
      transform: rotate(18deg);
      animation: sweep 2.2s linear infinite;
      filter: blur(.2px);
    }
    @keyframes sweep{
      0%{transform:translateX(0) rotate(18deg);opacity:.0}
      10%{opacity:.9}
      45%{opacity:.9}
      60%{opacity:.0}
      100%{transform:translateX(520px) rotate(18deg);opacity:0}
    }

    .bgGlow{
      position:absolute;left:50%;top:110px;transform:translateX(-50%);
      width:120%;height:260px;
      background: radial-gradient(closest-side, rgba(255,255,255,.22), rgba(255,255,255,0));
      filter: blur(2px);
      z-index:1;
    }

    /* 主面板 */
    .panel{
      position:absolute;
      left:14px; right:14px;
      top:86px; bottom:18px;
      background: linear-gradient(180deg, var(--gold1) 0%, var(--gold2) 100%);
      border-radius:22px;
      padding:12px;
      border:2px solid rgba(255,255,255,.55);
      box-shadow:0 18px 60px rgba(0,0,0,.18);
      z-index:2;
      display:flex;
      flex-direction:column;
    }

    .gridWrap{
      flex:1;
      background:rgba(255,255,255,.35);
      border-radius:18px;
      border:2px solid rgba(255,255,255,.55);
      padding:10px;
      display:flex;
    }

    .grid{
      width:100%;
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
    }

    .tile{
      border-radius:16px;
      border:2px solid var(--stroke);
      background: linear-gradient(180deg, #ffffff 0%, #ffe9b8 100%);
      box-shadow:0 10px 18px rgba(0,0,0,.06);
      position:relative;
      overflow:hidden;
      user-select:none;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:10px;
      min-height:104px;
    }

    .tag{
      position:absolute;left:10px;top:10px;
      background:#ff4b4b;color:#fff;
      font-size:11px;font-weight:900;
      padding:3px 8px;border-radius:999px;
      box-shadow:0 6px 14px rgba(255,75,75,.35);
    }
    .tag.blue{background:#4a90e2;box-shadow:0 6px 14px rgba(74,144,226,.25)}
    .tag.purple{background:#8e44ad;box-shadow:0 6px 14px rgba(142,68,173,.25)}

    .mainText{
      color:var(--text);
      font-weight:900;
      line-height:1.05;
      font-size:18px;
    }
    .subText{
      margin-top:6px;
      color:rgba(122,43,0,.85);
      font-weight:800;
      font-size:12px;
      line-height:1.2;
    }

    /* 红包样式（补贴金） */
    .hongbao{
      background: linear-gradient(180deg, #ff4b4b 0%, #ff2f6a 100%);
      border-color: rgba(255,255,255,.35);
    }
    .hongbao .mainText{color:#fff}
    .hongbao .subText{color:rgba(255,255,255,.92)}
    .hongbao::after{
      content:"";
      position:absolute;left:0;right:0;top:0;height:34px;
      background: linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,0));
    }

    /* 优惠券样式 */
    .coupon{
      background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
      border-color:#b9d7ff;
    }
    .coupon::before{
      content:"";
      position:absolute;left:-10px;top:50%;
      width:20px;height:20px;border-radius:50%;
      background:rgba(255,255,255,.35);
      transform:translateY(-50%);
    }
    .coupon::after{
      content:"";
      position:absolute;right:-10px;top:50%;
      width:20px;height:20px;border-radius:50%;
      background:rgba(255,255,255,.35);
      transform:translateY(-50%);
    }
    .coupon .mainText{color:#1f5fbf}
    .coupon .subText{color:rgba(31,95,191,.85)}

    /* 券包样式 */
    .pack{
      background: linear-gradient(180deg, #fff 0%, #fff0f0 100%);
      border-color:#ffb3b3;
    }
    .pack .mainText{color:#c0392b}
    .pack .subText{color:rgba(192,57,43,.85)}

    /* 商品抢购样式 */
    .product{
      background: linear-gradient(180deg, #ffffff 0%, #fff7e6 100%);
      border-color:#ffd27a;
      padding:10px 10px 8px;
      align-items:flex-start;
      justify-content:flex-start;
      text-align:left;
    }
    .pRow{display:flex;gap:10px;align-items:center;width:100%}
    .pImg{
      width:44px;height:44px;border-radius:12px;
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      box-shadow:0 10px 18px rgba(0,0,0,.06);
      flex:0 0 auto;
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;
    }
    .pImg img{width:100%;height:100%;object-fit:cover}
    .pInfo{flex:1;min-width:0}
    .pTitle{
      font-weight:900;color:#7a2b00;font-size:12px;line-height:1.2;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .pPrice{
      margin-top:6px;
      font-weight:1000;
      color:#ff3b30;
      font-size:12px;
    }
    .pPrice b{font-size:16px}
    .pPrice span{color:rgba(122,43,0,.75);font-weight:800;margin-left:6px}

    /* 中间抽奖按钮 */
    .center{
      padding:0;
      border-color:#ffb84d;
      background: linear-gradient(180deg, #fff 0%, #ffe9b8 100%);
    }
    .centerBtn{
      width:100%;height:100%;
      border:0;border-radius:14px;
      background: radial-gradient(120px 120px at 50% 30%, rgba(255,255,255,.35), rgba(255,255,255,0)),
                  linear-gradient(180deg, #ff3b30 0%, #ff7a00 100%);
      color:#fff;
      font-weight:1000;
      font-size:20px;
      letter-spacing:2px;
      box-shadow:0 12px 26px rgba(255,59,48,.35);
      cursor:pointer;
    }
    .centerBtn:active{transform:scale(.99)}
    .centerBtn small{
      display:block;
      font-size:12px;
      opacity:.92;
      letter-spacing:0;
      margin-top:4px;
      font-weight:900;
    }

    /* 高亮 */
    .highlight{
      border-color:#ffcc00 !important;
      box-shadow: 0 0 0 3px rgba(255,204,0,.55), 0 12px 26px rgba(255,59,48,.18);
      background: linear-gradient(180deg, #fff 0%, #ffe08a 100%) !important;
    }

    /* ====== Win Modal (coin + card) ====== */
    .winMask{
      position:fixed; inset:0;
      background:rgba(0,0,0,.35);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:999;
    }
    .winModal{
      width:min(380px, 92vw);
      background:#fff;
      border-radius:22px;
      padding:18px 16px 14px;
      box-shadow:0 22px 70px rgba(0,0,0,.35);
      position:relative;
      overflow:hidden;
    }
    .winTitle{
      font-size:26px;
      font-weight:1000;
      color:#111;
      text-align:center;
      margin:6px 0 14px;
      letter-spacing:1px;
    }
    .payCard{
      width:210px;
      margin:0 auto 14px;
      border-radius:18px;
      background: linear-gradient(180deg, #f4fff7 0%, #eafff0 100%);
      border:2px solid rgba(7,193,96,.25);
      overflow:hidden;
      box-shadow:0 14px 30px rgba(7,193,96,.18);
    }
    .payCardTop{
      padding:14px 14px 10px;
      background: linear-gradient(180deg, rgba(7,193,96,.18) 0%, rgba(7,193,96,.06) 100%);
      border-bottom:1px solid rgba(7,193,96,.18);
      text-align:center;
    }
    .payAmount{
      font-size:34px;
      font-weight:1000;
      color:#07c160;
      line-height:1;
    }
    .payCardBottom{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 12px 12px;
      color:#07c160;
      font-weight:900;
      font-size:14px;
    }
    .payCheck{
      width:18px;height:18px;border-radius:50%;
      background:#07c160;
      display:inline-flex;align-items:center;justify-content:center;
      color:#fff;font-size:12px;line-height:1;
    }
    .winBtn{
      width:100%;
      border:0;
      border-radius:999px;
      padding:14px 14px;
      background:#07c160;
      color:#fff;
      font-weight:1000;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 14px 30px rgba(7,193,96,.25);
    }
    .winBtn:active{transform:scale(.99)}
    .winHint{
      margin-top:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      color:rgba(7,193,96,.95);
      font-weight:900;
      font-size:14px;
    }
    .winHint .dot{
      width:18px;height:18px;border-radius:50%;
      background:rgba(7,193,96,.12);
      border:2px solid rgba(7,193,96,.35);
      display:inline-flex;align-items:center;justify-content:center;
      font-size:12px;
    }
    .finger{
      position:absolute;
      right:14px;
      bottom:18px;
      width:86px;
      height:86px;
      pointer-events:none;
      opacity:.95;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.18));
      animation: tap 1.1s ease-in-out infinite;
    }
    @keyframes tap{
      0%{transform:translate(0,0) scale(1)}
      50%{transform:translate(-6px,6px) scale(0.98)}
      100%{transform:translate(0,0) scale(1)}
    }
    .coinLayer{
      position:fixed; inset:0;
      pointer-events:none;
      z-index:998;
      display:none;
      overflow:hidden;
    }
    .coin{
      position:absolute;
      top:-60px;
      width:34px;height:34px;border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #fff6b8 0%, #ffd24d 35%, #ffb300 70%, #d98b00 100%);
      box-shadow:0 10px 18px rgba(0,0,0,.18);
      opacity:.95;
      animation: fall linear forwards;
    }
    .coin::after{
      content:"";
      position:absolute; inset:7px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.35);
    }
    @keyframes fall{
      to{ transform: translateY(120vh) rotate(520deg); opacity: .98; }
    }

    @media (max-height: 720px){
      .panel{top:78px;bottom:12px}
      .tile{min-height:96px}
    }
  </style>
</head>

  <!-- 金币层 -->
  <div class="coinLayer" id="coinLayer"></div>

  <!-- 中奖弹窗 -->

<script>
(() => {
  // 8格顺时针路径（绕开中心 4）
  const order = [0,1,2,5,8,7,6,3];
  let idx = 0;
  let idleTimer = null;
  let spinning = false;

  const startBtn = document.getElementById('startBtn');

  const winMask = document.getElementById('winMask');
  const winBtn = document.getElementById('winBtn');
  const winAmount = document.getElementById('winAmount');
  const coinLayer = document.getElementById('coinLayer');

  function setHighlight(orderIndex){
    document.querySelectorAll('.tile').forEach(t => t.classList.remove('highlight'));
    const i = order[orderIndex % order.length];
    const el = document.querySelector(`.tile[data-i="${i}"]`);
    if(el) el.classList.add('highlight');
  }

  function startIdle(){
    if(idleTimer) clearInterval(idleTimer);
    idleTimer = setInterval(() => {
      if(spinning) return;
      idx = (idx + 1) % order.length;
      setHighlight(idx);
    }, 170);
  }

  function spinTo(targetDataI){
    if(spinning) return;
    spinning = true;

    const targetIndex = order.indexOf(targetDataI);
    if(targetIndex < 0){ spinning = false; return; }

    let steps = 0;
    const minRounds = 4;
    const need = (targetIndex - idx + order.length) % order.length;
    const totalSteps = minRounds * order.length + need;

    let delay = 55;

    function tick(){
      idx = (idx + 1) % order.length;
      setHighlight(idx);
      steps++;

      const p = steps / totalSteps;
      if(p > 0.60) delay = 110;
      if(p > 0.78) delay = 170;
      if(p > 0.90) delay = 240;

      if(steps >= totalSteps){
        spinning = false;
        setTimeout(() => {
          winAmount.textContent = "99";
          startCoins();
          winMask.style.display = 'flex';
        }, 220);
        return;
      }
      setTimeout(tick, delay);
    }
    tick();
  }

  function startCoins(){
    coinLayer.innerHTML = "";
    coinLayer.style.display = "block";

    const count = 26;
    for(let i=0;i<count;i++){
      const c = document.createElement("div");
      c.className = "coin";
      const left = Math.random() * 100;
      const dur = 1.6 + Math.random() * 1.4;
      const delay = Math.random() * 0.35;
      const size = 22 + Math.random() * 18;
      c.style.left = left + "vw";
      c.style.width = size + "px";
      c.style.height = size + "px";
      c.style.animationDuration = dur + "s";
      c.style.animationDelay = delay + "s";
      coinLayer.appendChild(c);
    }

    setTimeout(() => {
      coinLayer.style.display = "none";
    }, 3200);
  }

  startBtn.addEventListener('click', () => {
    // 固定命中 99 补贴金（data-i=0）
    spinTo(0);
  });

  // 合规：跳转到自有“领取页（演示）”，不仿冒微信页面
  winBtn.addEventListener('click', () => {
    location.href = "./claim.html?amount=99";
  });

  // 点击遮罩空白处关闭（如不需要可删除）
  winMask.addEventListener('click', (e) => {
    if(e.target === winMask){
      winMask.style.display = "none";
    }
  });

  // init
  setHighlight(idx);
  startIdle();
})();
</script>
</body>
</html>
