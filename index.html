<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>补贴金抽奖（演示）</title>
  <style>
    :root{
      --bg1:#ff4b4b;
      --bg2:#ff2f6a;
      --card:#fff3d6;
      --tile:#ffffff;
      --tile2:#ffe9b8;
      --stroke:#ffd27a;
      --hi:#ff3b30;
      --hi2:#ffcc00;
      --text:#7a2b00;
    }
    *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(1200px 600px at 50% 20%, #ff9aa8 0%, var(--bg2) 35%, var(--bg1) 100%);
      padding:18px;
    }
    .phone{
      width:min(420px, 96vw);
      border-radius:26px;
      padding:14px;
      background: linear-gradient(180deg, #ff6a6a 0%, #ff3f6a 55%, #ff4b4b 100%);
      box-shadow:0 18px 60px rgba(0,0,0,.25);
      position:relative;
      overflow:hidden;
    }
    .topbar{
      display:flex;align-items:center;justify-content:space-between;
      color:#fff;opacity:.95;font-weight:600;
      padding:6px 6px 10px;
      font-size:14px;
    }
    .title{
      margin:0 auto;
      background:rgba(255,255,255,.18);
      padding:6px 12px;border-radius:999px;
      font-size:13px;
      max-width:80%;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .panel{
      background: linear-gradient(180deg, #ffe7b0 0%, #fff2cf 100%);
      border-radius:18px;
      padding:12px;
      border:2px solid rgba(255,255,255,.55);
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
      padding:6px;
      background:rgba(255,255,255,.35);
      border-radius:16px;
      border:2px solid rgba(255,255,255,.55);
    }
    .tile{
      height:92px;
      border-radius:14px;
      background: linear-gradient(180deg, var(--tile) 0%, var(--tile2) 100%);
      border:2px solid var(--stroke);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:10px;
      position:relative;
      color:var(--text);
      font-weight:700;
      user-select:none;
    }
    .tile small{display:block;font-weight:600;opacity:.85;margin-top:6px}
    .tag{
      position:absolute;left:10px;top:10px;
      background:#ff4b4b;color:#fff;
      font-size:11px;font-weight:800;
      padding:3px 7px;border-radius:999px;
      box-shadow:0 6px 14px rgba(255,75,75,.35);
    }
    .centerBtn{
      background: linear-gradient(180deg, #ff3b30 0%, #ff7a00 100%);
      border:0;
      color:#fff;
      font-size:18px;
      font-weight:900;
      border-radius:14px;
      width:100%;
      height:100%;
      box-shadow:0 10px 22px rgba(255,59,48,.35);
      cursor:pointer;
    }
    .centerBtn:active{transform:scale(.99)}
    .highlight{
      border-color: var(--hi2) !important;
      box-shadow: 0 0 0 3px rgba(255,204,0,.55), 0 10px 22px rgba(255,59,48,.18);
      background: linear-gradient(180deg, #fff 0%, #ffe08a 100%) !important;
    }
    .footerNote{
      margin-top:10px;
      color:rgba(255,255,255,.92);
      font-size:12px;
      line-height:1.35;
      padding:0 4px;
    }

    /* modal */
    .mask{
      position:fixed;inset:0;background:rgba(0,0,0,.45);
      display:none;align-items:center;justify-content:center;
      padding:18px;
    }
    .modal{
      width:min(360px, 92vw);
      background:#fff;border-radius:18px;
      padding:16px 16px 14px;
      box-shadow:0 18px 60px rgba(0,0,0,.35);
    }
    .modal h3{margin:4px 0 8px;font-size:18px}
    .modal p{margin:0 0 12px;color:#333;opacity:.9;font-size:14px;line-height:1.45}
    .modal .row{display:flex;gap:10px}
    .btn{
      flex:1;border:0;border-radius:12px;
      padding:12px 10px;font-weight:800;font-size:15px;cursor:pointer;
    }
    .btn.gray{background:#f2f3f5;color:#333}
    .btn.red{background:#ff3b30;color:#fff}
    .demoBadge{
      position:absolute;right:12px;top:12px;
      background:rgba(0,0,0,.18);
      color:#fff;font-size:11px;font-weight:800;
      padding:4px 8px;border-radius:999px;
      border:1px solid rgba(255,255,255,.25);
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="demoBadge">演示 Demo</div>
    <div class="topbar">
      <div style="width:40px">‹</div>
      <div class="title">浮夸生eason补贴iPhone</div>
      <div style="width:40px;text-align:right">⋯</div>
    </div>

    <div class="panel">
      <div class="grid" id="grid">
        <!-- 0 -->
        <div class="tile" data-i="0"><span class="tag">特等奖</span><div>¥99<br><small>补贴金</small></div></div>
        <!-- 1 -->
        <div class="tile" data-i="1"><span class="tag">特等奖</span><div>¥99<br><small>补贴金</small></div></div>
        <!-- 2 -->
        <div class="tile" data-i="2"><div>神秘礼品<br><small>¥66</small></div></div>
        <!-- 3 -->
        <div class="tile" data-i="3"><div>优惠券<br><small>¥288</small></div></div>
        <!-- 4 center -->
        <div class="tile" data-i="4" style="padding:0;border-color:#ffb84d">
          <button class="centerBtn" id="startBtn">抽奖</button>
        </div>
        <!-- 5 -->
        <div class="tile" data-i="5"><span class="tag">特等奖</span><div>¥99<br><small>补贴金</small></div></div>
        <!-- 6 -->
        <div class="tile" data-i="6"><div>无门槛券<br><small>¥5</small></div></div>
        <!-- 7 -->
        <div class="tile" data-i="7"><div>神秘礼品<br><small>¥188</small></div></div>
        <!-- 8 -->
        <div class="tile" data-i="8"><div>全平台券包<br><small>¥88</small></div></div>
      </div>
    </div>

    <div class="footerNote">
      说明：本页面仅用于录屏演示抽奖动效，不对接微信支付/入账，不生成任何真实资金凭证。
    </div>
  </div>

  <!-- modal -->
  <div class="mask" id="mask">
    <div class="modal">
      <h3 id="mTitle">恭喜你，中奖了</h3>
      <p id="mText">你获得：<b>99元补贴金</b>（演示）</p>
      <div class="row">
        <button class="btn gray" id="closeBtn">关闭</button>
        <button class="btn red" id="claimBtn">领取</button>
      </div>
    </div>
  </div>

<script>
(() => {
  const tiles = [...document.querySelectorAll('.tile')].filter(t => t.dataset.i !== "4");
  const startBtn = document.getElementById('startBtn');
  const mask = document.getElementById('mask');
  const closeBtn = document.getElementById('closeBtn');
  const claimBtn = document.getElementById('claimBtn');

  // 顺时针路径（绕开中心）
  const order = [0,1,2,5,8,7,6,3]; // 8格
  let idx = 0;
  let timer = null;
  let running = true;
  let spinning = false;

  function setHighlight(orderIndex){
    tiles.forEach(t => t.classList.remove('highlight'));
    const i = order[orderIndex % order.length];
    const el = document.querySelector(`.tile[data-i="${i}"]`);
    if(el) el.classList.add('highlight');
  }

  // 默认持续高亮跳动
  function startIdle(){
    if(timer) clearInterval(timer);
    running = true;
    timer = setInterval(() => {
      if(spinning) return;
      idx = (idx + 1) % order.length;
      setHighlight(idx);
    }, 180);
  }

  // 点击抽奖：加速->减速->停在指定格（99元）
  function spinTo(targetDataI){
    if(spinning) return;
    spinning = true;

    // 找到目标在order中的位置
    const targetIndex = order.indexOf(targetDataI);
    if(targetIndex < 0) { spinning = false; return; }

    let steps = 0;
    const minRounds = 4; // 至少转4圈
    const totalSteps = minRounds * order.length + ((targetIndex - idx + order.length) % order.length);

    let delay = 60;
    function tick(){
      idx = (idx + 1) % order.length;
      setHighlight(idx);
      steps++;

      // 逐步减速
      const progress = steps / totalSteps;
      if(progress > 0.65) delay = 120;
      if(progress > 0.80) delay = 180;
      if(progress > 0.92) delay = 260;

      if(steps >= totalSteps){
        spinning = false;
        // 弹窗
        setTimeout(() => { mask.style.display = 'flex'; }, 250);
        return;
      }
      setTimeout(tick, delay);
    }
    tick();
  }

  startBtn.addEventListener('click', () => {
    // 固定命中一个“99元补贴金”格子：这里停在 data-i=1
    spinTo(1);
  });

  closeBtn.addEventListener('click', () => {
    mask.style.display = 'none';
  });

  claimBtn.addEventListener('click', () => {
    // 合规：跳转到“演示领取说明页”，不仿冒微信
    location.href = "./claim.html";
  });

  // init
  setHighlight(idx);
  startIdle();
})();
</script>
</body>
</html>
