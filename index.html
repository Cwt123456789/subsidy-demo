<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>幸运抽奖</title>
  <style>
    :root{
      --red1:#ff3b3b;
      --red2:#ff2f6a;
      --gold1:#ffe7b0;
      --gold2:#fff2cf;
      --stroke:#ffd27a;
      --text:#7a2b00;
      --green:#07c160;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
      background: radial-gradient(1200px 700px at 50% 15%, #ff9aa8 0%, var(--red2) 35%, var(--red1) 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .stage{
      width:min(430px, 100vw);
      height:min(860px, 100vh);
      aspect-ratio: 9 / 16;
      position:relative;
      overflow:hidden;
    }

    .top{
      position:absolute;left:0;right:0;top:0;
      padding:14px 14px 10px;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      z-index:5;
      pointer-events:none;
    }
    .top .left,.top .right{width:56px;opacity:.95;font-weight:800;font-size:16px}
    .top .right{text-align:right}
    .top .center{flex:1;display:flex;justify-content:center}

    /* 清晰且有氛围的标题 */
    .titleWrap{
      position:relative;
      padding:10px 18px;
      border-radius:999px;
      background: linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,.10));
      border:1px solid rgba(255,255,255,.28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      pointer-events:auto;
      user-select:none;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
    }
    .title{
      font-size:18px;
      font-weight:1000;
      letter-spacing:2px;
      background: linear-gradient(180deg, #fff 0%, #ffe9b8 45%, #ffd36a 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      -webkit-text-stroke: 1px rgba(120,40,0,.25);
      text-shadow:
        0 2px 0 rgba(0,0,0,.08),
        0 10px 22px rgba(0,0,0,.22);
      filter:none;
    }
    .spark{
      position:absolute; inset:-6px;
      border-radius:999px;
      overflow:hidden;
      pointer-events:none;
    }
    .spark::before{
      content:"";
      position:absolute;
      width:140px;height:140px;
      left:-160px;top:-50px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.95) 0%, rgba(255,255,255,.35) 35%, rgba(255,255,255,0) 70%);
      transform: rotate(18deg);
      animation: sweep 2.1s linear infinite;
    }
    @keyframes sweep{
      0%{transform:translateX(0) rotate(18deg);opacity:0}
      12%{opacity:.95}
      48%{opacity:.95}
      62%{opacity:0}
      100%{transform:translateX(560px) rotate(18deg);opacity:0}
    }
    .stars{
      position:absolute; inset:0;
      pointer-events:none;
      opacity:.95;
    }
    .stars::before,.stars::after{
      content:"✦";
      position:absolute;
      color:rgba(255,255,255,.95);
      text-shadow:0 10px 18px rgba(0,0,0,.18);
      animation: twinkle 1.6s ease-in-out infinite;
    }
    .stars::before{left:10px;top:-6px;font-size:14px;animation-delay:.2s}
    .stars::after{right:12px;bottom:-8px;font-size:16px;animation-delay:.8s}
    @keyframes twinkle{
      0%,100%{transform:scale(1);opacity:.65}
      50%{transform:scale(1.25);opacity:1}
    }

    .bgGlow{
      position:absolute;left:50%;top:110px;transform:translateX(-50%);
      width:120%;height:260px;
      background: radial-gradient(closest-side, rgba(255,255,255,.22), rgba(255,255,255,0));
      filter: blur(2px);
      z-index:1;
    }

    .panel{
      position:absolute;
      left:14px; right:14px;
      top:86px; bottom:18px;
      background: linear-gradient(180deg, var(--gold1) 0%, var(--gold2) 100%);
      border-radius:22px;
      padding:12px;
      border:2px solid rgba(255,255,255,.55);
      box-shadow:0 18px 60px rgba(0,0,0,.18);
      z-index:2;
      display:flex;
      flex-direction:column;
    }

    .gridWrap{
      flex:1;
      background:rgba(255,255,255,.35);
      border-radius:18px;
      border:2px solid rgba(255,255,255,.55);
      padding:10px;
      display:flex;
    }

    .grid{
      width:100%;
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
    }

    .tile{
      border-radius:16px;
      border:2px solid var(--stroke);
      background: linear-gradient(180deg, #ffffff 0%, #ffe9b8 100%);
      box-shadow:0 10px 18px rgba(0,0,0,.06);
      position:relative;
      overflow:hidden;
      user-select:none;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:10px;
      min-height:104px;
    }

    .tag{
      position:absolute;left:10px;top:10px;
      background:#ff4b4b;color:#fff;
      font-size:11px;font-weight:1000;
      padding:3px 8px;border-radius:999px;
      box-shadow:0 6px 14px rgba(255,75,75,.35);
    }
    .tag.blue{background:#4a90e2;box-shadow:0 6px 14px rgba(74,144,226,.25)}
    .tag.purple{background:#8e44ad;box-shadow:0 6px 14px rgba(142,68,173,.25)}

    .mainText{
      color:var(--text);
      font-weight:1000;
      line-height:1.05;
      font-size:18px;
    }
    .subText{
      margin-top:6px;
      color:rgba(122,43,0,.85);
      font-weight:900;
      font-size:12px;
      line-height:1.2;
    }

    /* 红包/券包/券样式 */
    .hongbao{
      background: linear-gradient(180deg, #ff4b4b 0%, #ff2f6a 100%);
      border-color: rgba(255,255,255,.35);
    }
    .hongbao .mainText{color:#fff}
    .hongbao .subText{color:rgba(255,255,255,.92)}
    .hongbao::after{
      content:"";
      position:absolute;left:0;right:0;top:0;height:34px;
      background: linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,0));
    }
    .hongbao .hbIcon{
      position:absolute;
      left:50%; top:50%;
      transform:translate(-50%,-50%);
      width:92%;
      height:92%;
      opacity:.22;
      pointer-events:none;
    }

    .pack{
      background: linear-gradient(180deg, #fff 0%, #fff0f0 100%);
      border-color:#ffb3b3;
    }
    .pack .mainText{color:#c0392b}
    .pack .subText{color:rgba(192,57,43,.85)}
    .pack .packIcon{
      position:absolute;
      left:50%; top:50%;
      transform:translate(-50%,-50%);
      width:92%;
      height:92%;
      opacity:.22;
      pointer-events:none;
    }

    .coupon{
      background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
      border-color:#b9d7ff;
    }
    .coupon::before{
      content:"";
      position:absolute;left:-10px;top:50%;
      width:20px;height:20px;border-radius:50%;
      background:rgba(255,255,255,.35);
      transform:translateY(-50%);
    }
    .coupon::after{
      content:"";
      position:absolute;right:-10px;top:50%;
      width:20px;height:20px;border-radius:50%;
      background:rgba(255,255,255,.35);
      transform:translateY(-50%);
    }
    .coupon .mainText{color:#1f5fbf}
    .coupon .subText{color:rgba(31,95,191,.85)}
    .coupon .cpIcon{
      position:absolute;
      left:50%; top:50%;
      transform:translate(-50%,-50%);
      width:92%;
      height:92%;
      opacity:.18;
      pointer-events:none;
    }

    /* 商品格：上图下文 */
    .product{
      background: linear-gradient(180deg, #ffffff 0%, #fff7e6 100%);
      border-color:#ffd27a;
      padding:10px 10px 8px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      text-align:center;
      gap:8px;
    }
    .pImg{
      width:62px;height:62px;border-radius:14px;
      background:#fff;
      border:1px solid rgba(0,0,0,.06);
      box-shadow:0 10px 18px rgba(0,0,0,.06);
      overflow:hidden;
      flex:0 0 auto;
    }
    .pImg img{width:100%;height:100%;object-fit:cover;display:block}
    .pText{
      width:100%;
      color:#7a2b00;
      font-weight:1000;
      font-size:12px;
      line-height:1.25;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .center{
      padding:0;
      border-color:#ffb84d;
      background: linear-gradient(180deg, #fff 0%, #ffe9b8 100%);
    }
    .centerBtn{
      width:100%;height:100%;
      border:0;border-radius:14px;
      background: radial-gradient(120px 120px at 50% 30%, rgba(255,255,255,.35), rgba(255,255,255,0)),
                  linear-gradient(180deg, #ff3b30 0%, #ff7a00 100%);
      color:#fff;
      font-weight:1000;
      font-size:20px;
      letter-spacing:2px;
      box-shadow:0 12px 26px rgba(255,59,48,.35);
      cursor:pointer;
    }
    .centerBtn:active{transform:scale(.99)}
    .centerBtn small{
      display:block;
      font-size:12px;
      opacity:.92;
      letter-spacing:0;
      margin-top:4px;
      font-weight:900;
    }

    .highlight{
      border-color:#ffcc00 !important;
      box-shadow: 0 0 0 3px rgba(255,204,0,.55), 0 12px 26px rgba(255,59,48,.18);
      background: linear-gradient(180deg, #fff 0%, #ffe08a 100%) !important;
    }

    /* 中奖弹窗 */
    .winMask{
      position:fixed; inset:0;
      background:rgba(0,0,0,.35);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:999;
    }
    .winModal{
      width:min(380px, 92vw);
      background:#fff;
      border-radius:22px;
      padding:18px 16px 14px;
      box-shadow:0 22px 70px rgba(0,0,0,.35);
      position:relative;
      overflow:hidden;
    }
    .winTitle{
      font-size:26px;
      font-weight:1000;
      color:#111;
      text-align:center;
      margin:6px 0 14px;
      letter-spacing:1px;
    }
    .payCard{
      width:210px;
      margin:0 auto 14px;
      border-radius:18px;
      background: linear-gradient(180deg, #f4fff7 0%, #eafff0 100%);
      border:2px solid rgba(7,193,96,.25);
      overflow:hidden;
      box-shadow:0 14px 30px rgba(7,193,96,.18);
    }
    .payCardTop{
      padding:14px 14px 10px;
      background: linear-gradient(180deg, rgba(7,193,96,.18) 0%, rgba(7,193,96,.06) 100%);
      border-bottom:1px solid rgba(7,193,96,.18);
      text-align:center;
    }
    .payAmount{
      font-size:34px;
      font-weight:1000;
      color:var(--green);
      line-height:1;
    }
    .payCardBottom{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:10px 12px 12px;
      color:var(--green);
      font-weight:900;
      font-size:14px;
    }
    .payCheck{
      width:18px;height:18px;border-radius:50%;
      background:var(--green);
      display:inline-flex;align-items:center;justify-content:center;
      color:#fff;font-size:12px;line-height:1;
    }
    .winBtn{
      width:100%;
      border:0;
      border-radius:999px;
      padding:14px 14px;
      background:var(--green);
      color:#fff;
      font-weight:1000;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 14px 30px rgba(7,193,96,.25);
    }
    .winBtn:active{transform:scale(.99)}
    .winHint{
      margin-top:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      color:rgba(7,193,96,.95);
      font-weight:900;
      font-size:14px;
    }
    .winHint .dot{
      width:18px;height:18px;border-radius:50%;
      background:rgba(7,193,96,.12);
      border:2px solid rgba(7,193,96,.35);
      display:inline-flex;align-items:center;justify-content:center;
      font-size:12px;
    }

    /* 手指点击提示 */
    .tapHint{
      position:absolute;
      right:14px;
      bottom:18px;
      width:92px;
      height:92px;
      pointer-events:none;
      opacity:.95;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.18));
    }
    .tapHint .ring{
      position:absolute;
      right:18px;
      bottom:18px;
      width:34px;height:34px;border-radius:50%;
      border:2px solid rgba(7,193,96,.55);
      animation: ripple 1.2s ease-out infinite;
    }
    .tapHint .ring:nth-child(2){
      animation-delay:.35s;
      opacity:.75;
    }
    @keyframes ripple{
      0%{transform:scale(.65);opacity:.0}
      20%{opacity:.9}
      100%{transform:scale(1.55);opacity:0}
    }
    .tapHint svg{
      position:absolute;
      right:0; bottom:0;
      width:92px;height:92px;
    }

    /* 金币雨 */
    .coinLayer{
      position:fixed; inset:0;
      pointer-events:none;
      z-index:998;
      display:none;
      overflow:hidden;
    }
    .coin{
      position:absolute;
      top:-60px;
      width:34px;height:34px;border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #fff6b8 0%, #ffd24d 35%, #ffb300 70%, #d98b00 100%);
      box-shadow:0 10px 18px rgba(0,0,0,.18);
      opacity:.95;
      animation: fall linear forwards;
    }
    .coin::after{
      content:"";
      position:absolute; inset:7px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.35);
    }
    @keyframes fall{
      to{ transform: translateY(120vh) rotate(520deg); opacity: .98; }
    }

    @media (max-height: 720px){
      .panel{top:78px;bottom:12px}
      .tile{min-height:96px}
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="bgGlow"></div>

    <div class="top">
      <div class="left">‹</div>
      <div class="center">
        <div class="titleWrap">
          <div class="spark"></div>
          <div class="stars"></div>
          <div class="title">幸运抽奖</div>
        </div>
      </div>
      <div class="right">⋯</div>
    </div>

    <div class="panel">
      <div class="gridWrap">
        <div class="grid" id="grid">

          <div class="tile hongbao" data-i="0">
            <svg class="hbIcon" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 40c0-10 8-18 18-18h44c10 0 18 8 18 18v52c0 10-8 18-18 18H38c-10 0-18-8-18-18V40z" fill="white"/>
              <path d="M20 46h80" stroke="white" stroke-width="10" opacity=".55"/>
              <circle cx="60" cy="70" r="14" fill="white" opacity=".75"/>
            </svg>
            <span class="tag">特等奖</span>
            <div>
              <div class="mainText">¥99</div>
              <div class="subText">补贴金</div>
            </div>
          </div>

          <div class="tile hongbao" data-i="1">
            <svg class="hbIcon" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 40c0-10 8-18 18-18h44c10 0 18 8 18 18v52c0 10-8 18-18 18H38c-10 0-18-8-18-18V40z" fill="white"/>
              <path d="M20 46h80" stroke="white" stroke-width="10" opacity=".55"/>
              <circle cx="60" cy="70" r="14" fill="white" opacity=".75"/>
            </svg>
            <span class="tag">特等奖</span>
            <div>
              <div class="mainText">¥88</div>
              <div class="subText">补贴金</div>
            </div>
          </div>

          <!-- 鸡蛋 -->
          <div class="tile product" data-i="2">
            <span class="tag blue">三等奖</span>
            <div class="pImg">
              <img alt="鸡蛋" src="https://raw.githubusercontent.com/Cwt123456789/subsidy-demo/main/%E9%B8%A1%E8%9B%8B.webp" />
            </div>
            <div class="pText">1.88元抢购价值66元的鸡蛋</div>
          </div>

          <div class="tile coupon" data-i="3">
            <svg class="cpIcon" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 38c0-8 6-14 14-14h48c8 0 14 6 14 14v44c0 8-6 14-14 14H36c-8 0-14-6-14-14V38z" fill="#1f5fbf"/>
              <path d="M60 24v72" stroke="white" stroke-width="6" stroke-dasharray="8 8" opacity=".7"/>
            </svg>
            <div>
              <div class="mainText">¥5</div>
              <div class="subText">无门槛券</div>
            </div>
          </div>

          <div class="tile center" data-i="4">
            <button class="centerBtn" id="startBtn">抽奖<small>点击开始</small></button>
          </div>

          <!-- 抽纸 -->
          <div class="tile product" data-i="5">
            <span class="tag blue">三等奖</span>
            <div class="pImg">
              <img alt="抽纸" src="https://raw.githubusercontent.com/Cwt123456789/subsidy-demo/main/%E6%8A%BD%E7%BA%B8.webp" />
            </div>
            <div class="pText">1.99元抢购价值88元的抽纸</div>
          </div>

          <div class="tile hongbao" data-i="6">
            <svg class="hbIcon" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 40c0-10 8-18 18-18h44c10 0 18 8 18 18v52c0 10-8 18-18 18H38c-10 0-18-8-18-18V40z" fill="white"/>
              <path d="M20 46h80" stroke="white" stroke-width="10" opacity=".55"/>
              <circle cx="60" cy="70" r="14" fill="white" opacity=".75"/>
            </svg>
            <span class="tag purple">二等奖</span>
            <div>
              <div class="mainText">¥66</div>
              <div class="subText">补贴金</div>
            </div>
          </div>

          <!-- 水果 -->
          <div class="tile product" data-i="7">
            <span class="tag blue">三等奖</span>
            <div class="pImg">
              <img alt="水果" src="https://raw.githubusercontent.com/Cwt123456789/subsidy-demo/main/%E6%B0%B4%E6%9E%9C.webp" />
            </div>
            <div class="pText">2.99元抢购价值99元的水果</div>
          </div>

          <div class="tile pack" data-i="8">
            <svg class="packIcon" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
              <path d="M26 44c0-8 6-14 14-14h40c8 0 14 6 14 14v40c0 8-6 14-14 14H40c-8 0-14-6-14-14V44z" fill="#c0392b"/>
              <path d="M40 30c6 10 34 10 40 0" stroke="white" stroke-width="6" opacity=".7" fill="none"/>
              <path d="M60 30v68" stroke="white" stroke-width="6" opacity=".7"/>
            </svg>
            <div>
              <div class="mainText">¥88</div>
              <div class="subText">全平台券包</div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <div class="coinLayer" id="coinLayer"></div>

  <div class="winMask" id="winMask">
    <div class="winModal">
      <div class="winTitle">年度补贴金来啦！</div>

      <div class="payCard" aria-label="补贴金发放（演示）">
        <div class="payCardTop">
          <div class="payAmount" id="winAmount">99</div>
        </div>
        <div class="payCardBottom">
          <span class="payCheck">✓</span>
          <span>补贴金发放</span>
        </div>
      </div>

      <button class="winBtn" id="winBtn">开心收下</button>

      <div class="winHint">
        <span class="dot">✓</span>
        <span>退出后将失去领取资格</span>
      </div>

      <div class="tapHint" aria-hidden="true">
        <div class="ring"></div>
        <div class="ring"></div>
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="handG" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#ffd9bf"/>
              <stop offset="1" stop-color="#ffb07a"/>
            </linearGradient>
          </defs>
          <path d="M44 98c-8 0-14-6-14-14V60c0-6 4-10 10-10h10V30c0-6 4-10 10-10s10 4 10 10v22h6c6 0
