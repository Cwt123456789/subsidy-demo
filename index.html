<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>幸运大转盘 · 好礼相送</title>

  <style>
    :root {
      --red: #ff3b5c;
      --gold: #ffd27a;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
      --line: rgba(255, 120, 120, 0.5);
      --txt: #c72a48;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(1200px 800px at 50% 20%, #ff9aa6 0%, #ff5a73 35%, #ff3b5c 70%, #e81f45 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    /* 主卡片 */
    .page {
      width: min(430px, 100vw);
      height: min(860px, 100vh);
      aspect-ratio: 9 / 16;
      border-radius: 38px;
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow);
      background: radial-gradient(900px 600px at 50% 10%, rgba(255, 255, 255, 0.28) 0%, rgba(255, 255, 255, 0) 60%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0));
      backdrop-filter: blur(0px);
    }

    .top {
      padding: 24px 18px 8px;
      text-align: center;
      color: #fff;
    }

    .title {
      font-size: 46px;
      font-weight: 1000;
      letter-spacing: 2px;
      text-shadow: 0 8px 28px rgba(0, 0, 0, 0.25);
      margin: 0 0 8px;
    }

    .sub {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 60px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 245, 0.85));
      color: var(--red);
      font-weight: 800;
      font-size: 15px;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    /* 转盘舞台 */
    .stage {
      position: absolute;
      left: 0;
      right: 0;
      top: 138px;
      bottom: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 12px;
    }

    .wheelWrap {
      width: min(360px, 90vw);
      aspect-ratio: 1/1;
      position: relative;
      filter: drop-shadow(0 20px 38px rgba(0, 0, 0, 0.22));
    }

    /* 固定指针 */
    .pointer {
      position: absolute;
      left: 50%;
      top: -14px;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-bottom: 32px solid #fff7e8;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.28));
      z-index: 12;
    }

    .pointer::after {
      content: "";
      position: absolute;
      left: -12px;
      top: 20px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff, #ffdd99, #ffbb44);
      border: 2px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
    }

    /* 跑马灯效果小灯珠 */
    .bulbs {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
    }

    .bulb {
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #fffbe6;
      box-shadow: 0 0 12px rgba(255, 220, 100, 0.9);
      opacity: 0.95;
      animation: twinkle 1.3s infinite alternate;
    }

    @keyframes twinkle {
      0% {
        opacity: 0.5;
        transform: scale(0.85);
      }
      100% {
        opacity: 1;
        transform: scale(1.2);
        background: #ffecb3;
      }
    }

    /* 外圈装饰 */
    .wheel {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.4), rgba(255, 80, 100, 0.6));
      border: 10px solid rgba(255, 245, 210, 0.6);
      z-index: 2;
      overflow: hidden;
    }

    /* 可旋转的盘子 */
    .plate {
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, #fffef7 0%, #fff3e0 95%);
      border: 7px solid rgba(255, 200, 100, 0.9);
      transform: rotate(0deg);
      transition: transform 4.2s cubic-bezier(0.12, 0.78, 0.12, 1);
      z-index: 3;
      overflow: hidden;
      /* 动态半径变量 */
      --rIcon: 70px;
      --rText: 160px;
    }

    /* 背景扇形 */
    .sliceBg {
      position: absolute;
      inset: 0;
      clip-path: polygon(50% 50%, 100% 0, 100% 100%);
      transform-origin: 50% 50%;
    }

    .sliceBg:nth-child(odd) {
      background: rgba(255, 110, 120, 0.08);
    }

    .sliceBg:nth-child(even) {
      background: rgba(255, 210, 130, 0.18);
    }

    /* 分隔线 */
    .divider {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2.5px;
      height: 50%;
      background: linear-gradient(180deg, rgba(255, 210, 122, 0.4), #ffb56b, rgba(255, 210, 122, 0.4));
      transform-origin: 50% 100%;
      z-index: 4;
      border-radius: 2px;
    }

    /* 每个扇区整体容器 */
    .seg {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 0;
      height: 0;
      transform-origin: center center;
      transform: rotate(var(--a));
      z-index: 6;
      pointer-events: none;
      --txt-rotate: 0deg;
    }

    /* 图标——更靠近圆心 */
    .segIcon {
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(var(--rIcon)) rotate(calc(-1 * var(--a)));
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #fff9ef;
      border: 1.5px solid rgba(255, 100, 120, 0.25);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    .segIcon svg {
      width: 32px;
      height: 32px;
      display: block;
    }

    .segIcon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 文字区域 - 大幅缩小半径，使其紧贴图标外侧但不至于飞远 */
    .segText {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: 0 0;
      transform: translate(var(--rText)) rotate(var(--txt-rotate));
      width: 92px;
      color: var(--txt);
      font-weight: 800;
      line-height: 1.15;
      text-align: center;
      text-shadow: 0 1px 3px rgba(255, 245, 210, 0.8);
      white-space: nowrap;
    }

    /* 文字严格分行，防止溢出 */
    .segText .l1 {
      font-size: 12.5px !important;
      font-weight: 900;
      letter-spacing: -0.2px;
      background: linear-gradient(135deg, #c72a48, #ff4d6a);
      background-clip: text;
      -webkit-background-clip: text;
      color: var(--txt);
      white-space: nowrap;
    }

    .segText .l2 {
      font-size: 9px !important;
      margin-top: 3px;
      font-weight: 700;
      opacity: 0.85;
      background: none;
      color: #ad3b52;
      white-space: nowrap;
    }

    /* 抽奖按钮 */
    .center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 118px;
      height: 118px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff6e5, #ffe0b5, #ffc885);
      border: 8px solid rgba(255, 255, 255, 0.75);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.22);
      z-index: 10;
      cursor: pointer;
      transition: all 0.08s linear;
    }

    .center:active {
      transform: translate(-50%, -50%) scale(0.97);
    }

    .centerBtn {
      width: 88px;
      height: 88px;
      margin: 7px auto;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ff7a8c, #ff3b5c 60%, #da1f45);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 1000;
      box-shadow: inset 0 4px 12px rgba(255, 255, 255, 0.35), 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    .centerBtn .big {
      font-size: 20px;
      letter-spacing: 1px;
    }

    .centerBtn .small {
      font-size: 10px;
      margin-top: 4px;
      opacity: 0.95;
    }

    .footerTip {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 20px;
      text-align: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 5px 12px rgba(0, 0, 0, 0.2);
      font-weight: 600;
    }

    /* 中奖弹窗 */
    .winMask {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(3px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 30;
    }

    .winModal {
      width: min(320px, 82%);
      background: #fffef9;
      border-radius: 38px;
      box-shadow: 0 32px 56px rgba(0, 0, 0, 0.28);
      overflow: hidden;
      border: 1px solid #ffda99;
      animation: bounce 0.3s cubic-bezier(0.2, 1.1, 0.4, 1);
    }

    @keyframes bounce {
      0% {
        transform: scale(0.92);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .winTitle {
      padding: 20px 20px 8px;
      font-weight: 900;
      font-size: 20px;
      text-align: center;
      color: #e83456;
    }

    .payCard {
      margin: 8px 20px 18px;
      border-radius: 28px;
      padding: 18px 12px;
      background: linear-gradient(145deg, #fff3e2, #fff7ef);
      border: 1px solid #ffce98;
      text-align: center;
    }

    .payCard .big {
      font-size: 46px;
      font-weight: 1000;
      color: #1f2a3e;
      letter-spacing: 1px;
      margin: 6px 0 2px;
    }

    .payCard .sub2 {
      font-size: 13px;
      color: #a05c2c;
      font-weight: 600;
    }

    .winBtn {
      width: calc(100% - 40px);
      margin: 0 20px 18px;
      border: 0;
      border-radius: 60px;
      padding: 14px 12px;
      background: #07c160;
      color: white;
      font-weight: 800;
      font-size: 17px;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(7, 193, 96, 0.3);
      transition: all 0.1s;
    }

    .winBtn:active {
      transform: scale(0.98);
    }

    .winHint {
      padding: 0 16px 20px;
      text-align: center;
      color: #8f7a5c;
      font-size: 11px;
    }

    /* 金币雨 */
    #coinLayer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: none;
      z-index: 25;
      overflow: hidden;
    }

    .coin {
      position: absolute;
      top: -30px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ffeaac, #f5b81b, #daa520);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(120vh) rotate(540deg);
        opacity: 0.7;
      }
    }
  </style>
</head>

  <script>
    (function () {
      // ---------- 奖品数据 ----------
      const prizes = [
        { label: '1.5元无门槛券', amount: 1.5, tag: '券' },
        { label: '99元补贴金', amount: 99, tag: '现金' },
        { label: '1.99元抢购水果', amount: 1.99, tag: '超值' },
        { label: '88元补贴金', amount: 88, tag: '现金' },
        { label: '1.88元抢购鸡蛋', amount: 1.88, tag: '商品' },
        { label: '10元无门槛券', amount: 10, tag: '券' },
        { label: '66元补贴金', amount: 66, tag: '现金' },
        { label: '1.99元抢购抽纸', amount: 1.99, tag: '商品' }
      ];

      const plateEl = document.getElementById('plate');
      const startBtn = document.getElementById('startBtn');
      const winMask = document.getElementById('winMask');
      const winBtn = document.getElementById('winBtn');
      const winAmountSpan = document.getElementById('winAmount');
      const winLabelSpan = document.getElementById('winLabel');
      const coinLayer = document.getElementById('coinLayer');
      const bulbs = document.getElementById('bulbs');

      // 添加小灯珠
      function buildBulbs() {
        const count = 28;
        const radiusPercent = 48;
        for (let i = 0; i < count; i++) {
          const b = document.createElement('div');
          b.className = 'bulb';
          const rad = (i / count) * Math.PI * 2;
          const left = 50 + Math.cos(rad) * radiusPercent;
          const top = 50 + Math.sin(rad) * radiusPercent;
          b.style.left = `calc(${left}% - 5px)`;
          b.style.top = `calc(${top}% - 5px)`;

        const coinCount = 32;
        for (let i = 0; i < coinCount; i++) {
          const coin = document.createElement('div');
          coin.classList.add('coin');
          coin.style.left = Math.random() * 100 + '%';
          const duration = 1.6 + Math.random() * 1.2;
          coin.style.animationDuration = duration + 's';
          coin.style.animationDelay = Math.random() * 0.4 + 's';
          coinLayer.appendChild(coin);
          coin.addEventListener('animationend', () => coin.remove());
        }
        setTimeout(() => {
          if (coinLayer.children.length === 0) coinLayer.style.display = 'none';
          else {
            const check = setInterval(() => {
              if (coinLayer.children.length === 0) {

                clearInterval(check);
              }
            }, 200);
          }
        }, 2800);
      }

      function setInnerRadii() {

        if (!wrap) return;
        const rect = wrap.getBoundingClientRect();
        const size = Math.min(rect.width, rect.height);
        if (!size || size < 60) return false;
        // 关键调整：图标半径从 0.235 => 0.185 ，文字半径从 0.365 => 0.275
        // 让文字紧贴图标边缘但又整体位于扇形中央区域，距离圆心更近
        const rIconRaw = size * 0.182;
        const rTextRaw = size * 0.278;
        const rIcon = Math.min(48, Math.max(30, Math.floor(rIconRaw)));
        const rText = Math.min(82, Math.max(48, Math.floor(rTextRaw)));
        plateEl.style.setProperty('--rIcon', rIcon + 'px');
        plateEl.style.setProperty('--rText', rText + 'px');
        return true;
      }
