<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>领取补贴金（演示）</title>
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
      background:#f6f7f9;padding:18px}
    .card{width:min(420px,96vw);background:#fff;border-radius:16px;padding:16px;
      box-shadow:0 12px 40px rgba(0,0,0,.08)}
    h2{margin:0 0 10px;font-size:18px}
    p{margin:0 0 12px;color:#333;line-height:1.5;font-size:14px}
    .btn{display:block;width:100%;border:0;border-radius:12px;padding:12px 10px;
      font-weight:800;font-size:15px;background:#07c160;color:#fff;cursor:pointer}
    .btn2{margin-top:10px;background:#f2f3f5;color:#333}
    .tip{font-size:12px;color:#666}
  </style>
</head>
<body>
  <div class="card">
    <h2>领取补贴金（演示）</h2>
    <p>你已获得 <b>99 元补贴金</b>（仅录屏演示）。</p>
    <p class="tip">提示：本页面不对接微信支付，不会产生真实入账通知或零钱明细记录。</p>
    <button class="btn" onclick="alert('演示：领取成功（未产生真实入账）')">领取（演示）</button>
    <button class="btn btn2" onclick="location.href='./index.html'">返回抽奖</button>
  </div>
</body>
</html>
